version: '3.9'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://mcld:mcld2026@db:5432/mcld_db
      - GEE_SERVICE_ACCOUNT=${GEE_SERVICE_ACCOUNT:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./backend:/app
      - ./data:/app/data
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_MAPBOX_TOKEN=${MAPBOX_TOKEN:-pk.eyJ1IjoibWVyYWNvZGVsaWtoZG8iLCJhIjoiY2x4ZGVtbyJ9.demo}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

  db:
    image: postgis/postgis:15-3.3
    environment:
      - POSTGRES_USER=mcld
      - POSTGRES_PASSWORD=mcld2026
      - POSTGRES_DB=mcld_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
